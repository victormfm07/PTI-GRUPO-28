# ─── Servidor ────────────────────────────────────────────────
server.port=8080

# ─── MySQL ───────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/saudefacil?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=senha
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── Pool de conexões (HikariCP) ─────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=SaudeFacil-Pool

# ─── JPA / Hibernate ─────────────────────────────────────────
# update = cria/atualiza tabelas automaticamente sem apagar dados
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Aplicação ───────────────────────────────────────────────
spring.application.name=saude-facil
