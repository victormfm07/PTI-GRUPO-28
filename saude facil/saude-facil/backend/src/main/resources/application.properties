# ─── Servidor ────────────────────────────────────────────────
server.port=8080

# ─── SQLite ──────────────────────────────────────────────────
# A DataSource e resolvida em ConfiguracaoBancoDados para funcionar
# tanto rodando a partir da raiz do projeto quanto da pasta backend.

# ─── JPA / Hibernate ─────────────────────────────────────────
# update = cria/atualiza tabelas automaticamente sem apagar dados
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Aplicação ───────────────────────────────────────────────
spring.application.name=saude-facil
